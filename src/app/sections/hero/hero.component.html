<section class="hero" id="hero">
  <div class="hero__bg"></div>
  <div class="hero__overlay"></div>

  <div class="hero__content">
    <div class="hero__logo-wrap hero__anim hero__anim--1">
      <img class="hero__logo-img" src="/assets/images/logo.svg" alt="Livingston">
    </div>

    <div class="hero__divider hero__anim hero__anim--2">
      <div class="divider-gold divider-gold--center"></div>
    </div>

    <p class="hero__tagline hero__anim hero__anim--3">{{ 'hero.tagline' | translate }}</p>

    <button class="btn-ghost hero__cta hero__anim hero__anim--4" (click)="openReservation()">
      {{ 'hero.cta' | translate }}
    </button>
  </div>

</section>
