<footer class="footer">
  <div class="footer__inner section-container">

    <div class="footer__top">
      <div class="footer__brand">
        <span class="footer__name">LIVINGSTON</span>
        <span class="footer__tagline">{{ 'footer.tagline' | translate }}</span>
      </div>

      <nav class="footer__nav">
        <a class="footer__link" (click)="scrollTo('about')">{{ 'nav.about' | translate }}</a>
        <a class="footer__link" (click)="scrollTo('cuisine')">{{ 'nav.cuisine' | translate }}</a>
        <a class="footer__link" (click)="scrollTo('atmosphere')">{{ 'nav.atmosphere' | translate }}</a>
        <a class="footer__link" (click)="openReservation()">{{ 'nav.reservation' | translate }}</a>
        <a class="footer__link" (click)="scrollTo('contacts')">{{ 'nav.contacts' | translate }}</a>
      </nav>

      <div class="footer__right">
        <div class="lang-switcher">
          <button class="lang-btn" [class.lang-btn--active]="langSvc.current() === 'hy'" (click)="langSvc.set('hy')">AM</button>
          <span>/</span>
          <button class="lang-btn" [class.lang-btn--active]="langSvc.current() === 'ru'" (click)="langSvc.set('ru')">RU</button>
          <span>/</span>
          <button class="lang-btn" [class.lang-btn--active]="langSvc.current() === 'en'" (click)="langSvc.set('en')">EN</button>
        </div>
        <div class="footer__socials">
          <a href="https://www.instagram.com/livingston_restaurant/" target="_blank" rel="noopener" aria-label="Instagram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
          </a>
          <a href="https://www.facebook.com/livingston.restaurant/" target="_blank" rel="noopener" aria-label="Facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <div class="footer__divider"></div>
    <p class="footer__copy">{{ 'footer.copyright' | translate }}</p>

  </div>
</footer>
